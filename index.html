<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velvet Fork Restaurant</title>
  
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="navBar">
    <nav>
      <div class="location">
        <i class="fa-solid fa-location-dot"></i>
        <small>Cuttack</small>
        <i class="fa-solid fa-caret-down"></i>
      </div>

      <div class="profile">
        <i class="fa-solid fa-user"></i>
      </div>
    </nav>
  </div>
  
  <div class="banner">
    <img src="./image/header image.jpg" alt="food image">
    <div class="banner-text">
      <p class="brand-name">Velvet Fork</p>
      <p class="brand-dis">Elegance meets flavor, Every bite is a taste of royalty.</p>
    </div>
  </div>

  <div class="feature">
    <div class="card">
      <div class="card-img">
        <img src="./image/card image.jpg" alt="Card Image">
      </div>
      <div class="card-content">
          <h3>Order Online</h3>
          <p>Stay home and order to your doorstep</p>
          <button>Details</button>
      </div>
    </div>
    
    <div class="card">
      <div class="card-img">
        <img src="./image/dining.jpg" alt="Card Image">
      </div>
      <div class="card-content">
          <h3>Dining</h3>
          <p>Reserve Dining before time</p>
          <button>Details</button>
      </div>
    </div>
  </div>
  <script src="https://kit.fontawesome.com/c188e66d94.js" crossorigin="anonymous"></script>
</body>
</html>
