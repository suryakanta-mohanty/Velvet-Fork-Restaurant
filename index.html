<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velvet Fork Restaurant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="navBar">
    <nav>
      <div class="location">
        <i class="fa-solid fa-location-dot"></i>
        <small>Cuttack</small>
        <i class="fa-solid fa-caret-down"></i>
      </div>

      <div class="profile">
        <i class="fa-solid fa-user"></i>
      </div>
    </nav>
  </div>
  
  <div class="banner">
    <img src="./image/header image.jpg" alt="food image">
    <div class="banner-text">
      <p class="brand-name">Velvet Fork</p>
      <p class="brand-dis">Elegance meets flavor, Every bite is a taste of royalty.</p>
    </div>
  </div>

  <div class="feature">
    <div class="card" style="width: 18rem;">
      <div class="img-cover">
        <img src="./image/card image.jpg" class="card-img-top" alt="...">
      </div>
      <div class="card-body">
        <h5 class="card-title">Order Online</h5>
        <p class="card-text">Stay home and order to your doorstep</p>
        <a href="#" class="btn btn-primary">Order Now</a>
      </div>
    </div>
    
    <div class="card" style="width: 18rem;">
      <div class="img-cover">
        <img src="./image/dining.jpg" class="card-img-top" alt="...">
      </div>
      <div class="card-body">
        <h5 class="card-title">Reserve Dining</h5>
        <p class="card-text">Reserve a Table for before time</p>
        <a href="#" class="btn btn-primary">Book Now</a>
      </div>
    </div>
  </div>
  <script src="https://kit.fontawesome.com/c188e66d94.js" crossorigin="anonymous"></script>
</body>
</html>
